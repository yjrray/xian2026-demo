<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Our Team</h1>
    </header>
    
    <main>
        <section id="members">
            <!-- Team members will be added here -->
        </section>
        
        <section id="skills">
            <!-- Skills section will be added here -->
        </section>
        
        <section id="projects">
    <h2>Our Projects</h2>
    <div class="projects-grid">
        <div class="project-card" data-project="1">
            <h3>🚀 Project Alpha</h3>
            <p>A revolutionary web application for task management.</p>
            <div class="project-tags">
                <span class="tag">React</span>
                <span class="tag">Node.js</span>
            </div>
            <button class="project-btn">View Details</button>
        </div>
        <div class="project-card" data-project="2">
            <h3>📊 Data Dashboard</h3>
            <p>Real-time analytics and visualization platform.</p>
            <div class="project-tags">
                <span class="tag">Python</span>
                <span class="tag">D3.js</span>
            </div>
            <button class="project-btn">View Details</button>
        </div>
        <div class="project-card" data-project="3">
            <h3>🛒 E-Commerce API</h3>
            <p>Scalable REST API for online stores.</p>
            <div class="project-tags">
                <span class="tag">Java</span>
                <span class="tag">Spring Boot</span>
            </div>
            <button class="project-btn">View Details</button>
        </div>
    </div>
</section>
        
        <section id="contact">
            <!-- Contact form will be added here -->
        </section>
    </main>
    
    <footer>
        <p>Team Profile Page - 2025</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
